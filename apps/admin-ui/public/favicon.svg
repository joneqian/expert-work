<!-- Expert Work mark — 盾徽 + 对勾(专家 / 认证 / 优质工作)
     线宽 2、描边色 currentColor;dark 用 brand-cyan,light 用 brand-cyan-700。
     viewBox 24×24,可缩放为 favicon 16/32/180 与 sidebar 20。
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- 盾徽外形:顶部收窄、底部聚拢的认证盾 -->
  <path d="M12 3 L20 6 V11.5 C20 16.5 16.4 19.6 12 21 C7.6 19.6 4 16.5 4 11.5 V6 Z" />
  <!-- 内部对勾:已核验 / 优质交付 -->
  <path d="M8.5 12 L11 14.5 L15.5 9.5" />
</svg>
