# Live auto-mount test agent — skill-runtime §5.1 (PRs #736/#737).
#
# Binds the platform `pptx` skill + the `bash` tool in the office sandbox so
# tools/eval/verify_live_skill_runtime.py can prove the skill's files are
# materialized at /workspace/skills/pptx/ on a real sandbox acquire.
#
# Before registering: the `pptx` platform skill must be ACTIVE (imported skills
# start as DRAFT) — the verify script's `--setup` flips it for you.
#
# MODEL: defaults to anthropic. EDIT the model block to whatever provider you
# pasted a key for in /settings/platform (deepseek / qwen / glm …) and set the
# matching `sandbox.network.allowlist` host.
apiVersion: expert_work.io/v1
kind: Agent
metadata:
  name: pptx-skill-test
  version: '1.0.2'
  tenant: canonical
spec:
  description: >-
    Live auto-mount test agent: binds the platform pptx skill + bash in the
    office sandbox to prove /workspace/skills/pptx/ is seeded on acquire.

  tenant_config:
    isolation_level: dedicated_sandbox

  model:
    provider: deepseek # ← change to your configured provider
    name: deepseek-v4-pro # ← and its model name
    temperature: 0.2
    max_tokens: 4096

  system_prompt:
    template: |
      You are a test agent. When asked, use the bash tool to run the exact
      command given and report its full output verbatim. The pptx skill's
      bundled files are on disk under /workspace/skills/pptx/.

  tools:
    # Only read-only file tools: the auto-mount probe uses list_dir to list the
    # seeded skill dir off the sandbox filesystem. exec_python / bash are
    # high-risk (side_effect=irreversible) — they'd be approval-gated AND require
    # listing in policies.approval_required_tools (harness compliance), so this
    # read-only test agent omits them. Add them back (+ approval list) for real
    # pptx generation.
    - { type: builtin, name: read_file }
    - { type: builtin, name: list_dir }

  skills:
    - pptx

  sandbox:
    runtime: gvisor
    # Auto-mount proof only reads the seeded SKILL.md → the minimal image is
    # enough (and is always built by `make dev-up`). For real pptx GENERATION
    # add `image_variant: office` (needs the office image built on the host).
    resources:
      cpu: '1.0'
      memory: 1Gi
    network:
      egress: proxy
      allowlist:
        - api.deepseek.com # ← change to your model's API host
    filesystem:
      readonly_root: true
      writable:
        - /tmp
      persistent_workspace: true

  observability:
    log_level: info
