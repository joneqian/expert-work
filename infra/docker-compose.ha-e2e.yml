# Stream 9.4 HA-failover live E2E — second control-plane instance (green) +
# durable Postgres checkpointer on both colours.
#
# Two things this overlay sets up that the default dev stack does not:
#
# 1. A *second* live control-plane (green). ``make dev-up`` excludes green
#    because its default host port 8001 collides with the sandbox supervisor;
#    here green is remapped to 8002 so it runs alongside the full stack.
#
# 2. ``checkpointer_backend=postgres`` on BOTH colours. The dev stack defaults
#    to the in-memory LangGraph checkpointer (``memory`` — fine for single-process
#    dev), but failover RESUME is fundamentally cross-process: green can only
#    resume a run blue was executing if the run's LangGraph checkpoint is in a
#    store both processes share. With the in-memory saver each process has its
#    own state, so a reclaimed run has nothing to resume from and dies with
#    ``EmptyInputError``. Durable failover therefore REQUIRES the Postgres
#    checkpointer — this overlay is what makes the live proof meaningful.
#
# The DSN uses the sync-driver scheme and points straight at Postgres (not
# PgBouncer): AsyncPostgresSaver manages its own async pool and uses prepared
# statements, which PgBouncer transaction pooling does not support.
#
# Usage (after ``make dev-up`` has built the image + migrated):
#
#   docker compose -f infra/docker-compose.yml -f infra/docker-compose.ha-e2e.yml \
#       --profile full up -d --no-deps control-plane-blue control-plane-green
#   uv run python tools/ha/verify_failover.py
x-ha-env: &ha-env
  EXPERT_WORK_CHECKPOINTER_BACKEND: postgres
  EXPERT_WORK_CHECKPOINTER_DSN: postgresql://${EXPERT_WORK_DB_USER:-expert_work}:${EXPERT_WORK_DB_PASSWORD:-expert_work_dev}@postgres:5432/${EXPERT_WORK_DB_NAME:-expert_work_dev}
  # Dev OIDC config (docs/runbooks/getting-started.md). The control-plane reads
  # OIDC settings from env only; ``make dev-up`` injects these via the operator's
  # infra/.env, but bringing a colour up directly with this overlay does not
  # inherit that file, so the dev ID token (iss=localhost, aud=admin-ui) would be
  # rejected. Pin the documented dev values here: issuer matches the token's
  # ``iss``; JWKS is fetched from Keycloak over the internal compose hostname
  # (the localhost issuer is not reachable inside the container); both dev client
  # audiences are accepted.
  EXPERT_WORK_OIDC_ISSUER: http://localhost:8080/realms/expert-work
  EXPERT_WORK_OIDC_JWKS_URI: http://keycloak:8080/realms/expert-work/protocol/openid-connect/certs
  EXPERT_WORK_OIDC_AUDIENCE: '["expert-work-api-internal","expert-work-admin-ui"]'

services:
  control-plane-blue:
    environment:
      <<: *ha-env

  control-plane-green:
    ports: !override
      - "8002:8000"
    environment:
      <<: *ha-env
